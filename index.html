<script>
    const serviceUuid = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const characteristicUuidRx = "beb5483e-36e1-4688-b7f5-ea07361b26a8"; // ช่องรับ
    const characteristicUuidTx = "beb5483e-36e1-4688-b7f5-ea07361b26a9"; // ช่องส่งกลับ
    
    let myCharacteristicRx;
    let myCharacteristicTx;

    // ฟังก์ชันดักรอรับข้อความจากบอร์ด
    function handleNotifications(event) {
        let value = new TextDecoder().decode(event.target.value);
        const statusText = document.getElementById('btStatus');
        const btnSend = document.getElementById('btnSend');
        
        btnSend.disabled = false;
        btnSend.innerHTML = "🚀 อัปเดตรหัสลงบอร์ด";

        if (value === "OK") {
            alert("✅ เย้! น้องบอร์ดเชื่อมต่อ WiFi บ้านสำเร็จแล้วจ้า!");
            statusText.innerHTML = "✅ เน็ตต่อติดแล้ว! สุดยอดเลย";
            statusText.style.color = "#00cc66";
        } else if (value === "FAIL") {
            alert("❌ ว้า... เชื่อมต่อไม่สำเร็จจ้า (รหัสอาจจะผิดน้า ลองเช็คแล้วพิมพ์ส่งใหม่ดูจ้า)");
            statusText.innerHTML = "❌ ต่อเน็ตไม่สำเร็จ ลองใหม่น้า";
            statusText.style.color = "red";
        }
    }

    document.getElementById('btnConnect').addEventListener('click', async () => {
        const statusText = document.getElementById('btStatus');
        try {
            statusText.innerHTML = "👀 กำลังหากันจนเจอ...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CYBER_BOARD_BLE' }],
                optionalServices: [serviceUuid]
            });

            statusText.innerHTML = "🤝 กำลังจับมือกัน...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(serviceUuid);
            
            // เชื่อมต่อทั้งช่องรับและช่องส่ง
            myCharacteristicRx = await service.getCharacteristic(characteristicUuidRx);
            myCharacteristicTx = await service.getCharacteristic(characteristicUuidTx);

            // เปิดการรับแจ้งเตือนจากบอร์ด
            await myCharacteristicTx.startNotifications();
            myCharacteristicTx.addEventListener('characteristicvaluechanged', handleNotifications);

            statusText.innerHTML = "✅ เชื่อมต่อแล้วจ้า! (" + device.name + ")";
            statusText.style.color = "#ff6b9d"; 
            document.getElementById('btnSend').disabled = false; 

        } catch (error) {
            statusText.innerHTML = "❌ หายไปไหนแล้ว... (เชื่อมต่อไม่สำเร็จ)";
            statusText.style.color = "#ff6b9d";
            console.error(error);
        }
    });

    document.getElementById('btnSend').addEventListener('click', async () => {
        let ssid = document.getElementById('txtSSID').value;
        let pass = document.getElementById('txtPass').value;
        const btnSend = document.getElementById('btnSend');

        if (!ssid || !pass) { 
            alert("❌ อย่าลืมกรอกชื่อ WiFi กับรหัสผ่านน้า"); 
            return; 
        }

        let dataToSend = ssid + "," + pass + "\n";
        let encoder = new TextEncoder();
        let dataArray = encoder.encode(dataToSend);

        try {
            btnSend.disabled = true;
            btnSend.innerHTML = "⏳ น้องกำลังหมุนติ้วๆ ลองต่อเน็ต...";
            
            // ส่งรหัสไป
            await myCharacteristicRx.writeValue(dataArray);
            
            // ไม่ต้องแจ้งเตือนตรงนี้แล้ว ให้ไปรอรับจากฟังก์ชัน handleNotifications แทน
        } catch (error) {
            alert("❌ ส่งข้อมูลพลาดจ้า: " + error);
            btnSend.disabled = false;
            btnSend.innerHTML = "🚀 อัปเดตรหัสลงบอร์ด";
        }
    });
</script>
